upstream rustdali_backend {
    server 127.0.0.1:8000;
}

upstream rustdali_frontend {
    server 127.0.0.1:3000;
}

server {
    listen 80;
    server_name localhost;

    # API requests -> FastAPI backend
    location /api/ {
        proxy_pass http://rustdali_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Allow large PDB file uploads
        client_max_body_size 50M;

        # Longer timeout for search submissions
        proxy_read_timeout 120s;
    }

    # Everything else -> Next.js frontend
    location / {
        proxy_pass http://rustdali_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Next.js HMR websocket (dev mode)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
